<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TripPilot</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f172a; color: #e2e8f0; height: 100vh; display: flex; flex-direction: column;
  }
  header {
    padding: 16px 24px; background: #1e293b; border-bottom: 1px solid #334155;
    display: flex; align-items: center; justify-content: space-between;
  }
  header h1 { font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  header h1 span { color: #38bdf8; }
  header button {
    background: #334155; color: #e2e8f0; border: 1px solid #475569;
    padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px;
  }
  header button:hover { background: #475569; }
  #status-badge {
    font-size: 12px; padding: 4px 10px; border-radius: 12px; background: #334155;
  }
  #status-badge.online { background: #166534; color: #86efac; }
  #status-badge.offline { background: #7f1d1d; color: #fca5a5; }
  #chat-container { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 12px; }
  .msg {
    max-width: 78%; padding: 10px 14px; border-radius: 12px; line-height: 1.5;
    font-size: 14px; white-space: pre-wrap; word-wrap: break-word;
  }
  .msg.user {
    align-self: flex-end; background: #0284c7; color: #fff;
    border-bottom-right-radius: 4px;
  }
  .msg.bot {
    align-self: flex-start; background: #1e293b; border: 1px solid #334155;
    border-bottom-left-radius: 4px;
  }
  .msg.system {
    align-self: center; background: transparent; color: #94a3b8; font-size: 12px;
    border: none; padding: 4px 8px;
  }
  .msg .timestamp { font-size: 11px; color: #94a3b8; margin-top: 4px; display: block; }
  #input-area {
    padding: 16px 24px; background: #1e293b; border-top: 1px solid #334155;
    display: flex; gap: 10px;
  }
  #input-area textarea {
    flex: 1; background: #0f172a; color: #e2e8f0; border: 1px solid #475569;
    border-radius: 8px; padding: 10px 14px; font-size: 14px; resize: none;
    font-family: inherit; min-height: 44px; max-height: 120px;
  }
  #input-area textarea:focus { outline: none; border-color: #38bdf8; }
  #input-area textarea::placeholder { color: #64748b; }
  #input-area button {
    background: #0284c7; color: #fff; border: none; border-radius: 8px;
    padding: 10px 20px; font-size: 14px; font-weight: 500; cursor: pointer;
    white-space: nowrap; align-self: flex-end;
  }
  #input-area button:hover { background: #0369a1; }
  #input-area button:disabled { opacity: 0.5; cursor: not-allowed; }
  .typing-indicator { display: flex; gap: 4px; padding: 4px 0; }
  .typing-indicator span {
    width: 8px; height: 8px; background: #64748b; border-radius: 50%;
    animation: bounce 1.4s infinite ease-in-out both;
  }
  .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
  .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
  @keyframes bounce { 0%,80%,100% { transform: scale(0); } 40% { transform: scale(1); } }
  .welcome { text-align: center; color: #94a3b8; margin-top: 40px; }
  .welcome h2 { font-size: 22px; margin-bottom: 8px; color: #e2e8f0; }
  .welcome p { font-size: 14px; max-width: 400px; margin: 0 auto; line-height: 1.6; }
  .welcome .examples { margin-top: 16px; display: flex; flex-direction: column; gap: 6px; }
  .welcome .examples button {
    background: #1e293b; color: #94a3b8; border: 1px solid #334155; border-radius: 8px;
    padding: 8px 14px; cursor: pointer; font-size: 13px; max-width: 360px; margin: 0 auto;
  }
  .welcome .examples button:hover { border-color: #38bdf8; color: #e2e8f0; }
  @media (max-width: 600px) {
    #chat-container { padding: 12px; }
    #input-area { padding: 12px; }
    .msg { max-width: 92%; }
  }
</style>
</head>
<body>

<header>
  <h1>&#9992; <span>Trip</span>Pilot</h1>
  <div style="display:flex;align-items:center;gap:12px">
    <span id="status-badge">checking...</span>
    <button id="new-chat-btn">&#x2795; New Chat</button>
  </div>
</header>

<div id="chat-container">
  <div class="welcome" id="welcome">
    <h2>Your AI Travel Concierge</h2>
    <p>Plan trips, search flights &amp; hotels, build itineraries, and make bookings &mdash; all through conversation.</p>
    <div class="examples">
      <button onclick="sendExample('Plan a trip to Tokyo for 5 days with a $2000 budget')">
        &#x1F5FA; Plan a trip to Tokyo
      </button>
      <button onclick="sendExample('I want to visit Paris next month for a week')">
        &#x1F30D; Visit Paris for a week
      </button>
      <button onclick="sendExample('Find me a hotel in New York near Times Square')">
        &#x1F3E8; Hotel near Times Square
      </button>
    </div>
  </div>
</div>

<div id="input-area">
  <textarea id="input" placeholder="Plan your trip..." rows="1" maxlength="2000"></textarea>
  <button id="send-btn">Send</button>
</div>

<script>
const chatContainer = document.getElementById('chat-container');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');
const statusBadge = document.getElementById('status-badge');
const welcome = document.getElementById('welcome');
const newChatBtn = document.getElementById('new-chat-btn');

let sessionId = null;
let isLoading = false;

function autoResize() {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
}

input.addEventListener('input', autoResize);

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

async function checkHealth() {
  try {
    const res = await fetch('/health');
    const data = await res.json();
    statusBadge.textContent = 'Online';
    statusBadge.className = 'online';
  } catch {
    statusBadge.textContent = 'Offline';
    statusBadge.className = 'offline';
  }
}
checkHealth();

function addMessage(text, role) {
  welcome.style.display = 'none';
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = text;
  chatContainer.appendChild(div);
  chatContainer.scrollTop = chatContainer.scrollHeight;
}

function addTypingIndicator() {
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typing';
  div.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
  chatContainer.appendChild(div);
  chatContainer.scrollTop = chatContainer.scrollHeight;
}

function removeTypingIndicator() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

function setLoading(loading) {
  isLoading = loading;
  sendBtn.disabled = loading;
  input.disabled = loading;
}

function sendExample(text) {
  input.value = text;
  autoResize();
  sendMessage();
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text || isLoading) return;

  addMessage(text, 'user');
  input.value = '';
  input.style.height = 'auto';
  setLoading(true);
  addTypingIndicator();

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, session_id: sessionId }),
    });

    removeTypingIndicator();

    if (res.ok) {
      const data = await res.json();
      sessionId = data.session_id;
      addMessage(data.response, 'bot');
    } else {
      const err = await res.json();
      addMessage('&#x26A0; Blocked: ' + err.detail, 'system');
    }
  } catch (err) {
    removeTypingIndicator();
    addMessage('&#x26A0; Connection error. Is the server running?', 'system');
  }

  setLoading(false);
}

newChatBtn.addEventListener('click', () => {
  sessionId = null;
  chatContainer.querySelectorAll('.msg').forEach(el => el.remove());
  welcome.style.display = '';
});

sendBtn.addEventListener('click', sendMessage);
</script>
</body>
</html>
